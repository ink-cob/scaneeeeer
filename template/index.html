<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет Мониторов</title>
    <!-- Настройки для запуска на телефоне на весь экран -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e1e2e">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e2e;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .form-container {
            background-color: #252538;
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        h2 { text-align: center; margin-top: 0; color: #a4b1cd; }
        label { display: block; margin-top: 10px; font-size: 14px; color: #b4bbc9; }
        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #3f3f56;
            border-radius: 8px;
            background-color: #1e1e2e;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }
        /* Подсветка для поля сканера */
        #serialInput { border: 2px solid #00befa; }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-add { background-color: #2ecc71; color: white; }
        .btn-download { background-color: #3498db; color: white; margin-top: 5px; }
        
        .table-container {
            width: 100%;
            max-width: 600px;
            overflow-x: auto;
            background-color: #252538;
            border-radius: 10px;
            padding: 10px;
            box-sizing: border-box;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background-color: #fff;
            color: #000;
        }
        th, td {
            border: 1px solid #dddddd;
            text-align: left;
            padding: 8px;
            font-size: 14px;
        }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Добавить монитор</h2>
        
        <!-- Поле для сканера. Сюда автоматически падает курсор -->
        <label for="serialInput">Серийный номер (Сканируйте сюда):</label>
        <input type="text" id="serialInput" placeholder="Ждет штрихкод..." autofocus>
        
        <label for="modelInput">Модель:</label>
        <input type="text" id="modelInput" placeholder="Например, UltraSharp">
        
        <label for="brandInput">Производитель:</label>
        <input type="text" id="brandInput" placeholder="Например, Dell">
        
        <label for="pcInput">Номер компьютера:</label>
        <input type="text" id="pcInput" placeholder="Например, ПК-01">
        
        <button class="btn-add" onclick="addRow()">Добавить в таблицу</button>
        <button class="btn-download" onclick="downloadWord()">Скачать для Word</button>
    </div>

    <!-- Предпросмотр таблицы на экране телефона -->
    <div class="table-container">
        <h3 style="margin:0; color:#a4b1cd;">Просмотр таблицы:</h3>
        <table id="monitorTable">
            <thead>
                <tr>
                    <th>Серийный номер</th>
                    <th>Модель</th>
                    <th>Производитель</th>
                    <th>Номер компьютера</th>
                </tr>
            </thead>
            <tbody>
                <!-- Сюда будут добавляться строки -->
            </tbody>
        </table>
    </div>

    <script>
        // Принудительно возвращаем курсор в поле сканера при загрузка страницы
        window.onload = function() {
            document.getElementById("serialInput").focus();
        };

        // Логика автоматического перехода после сканирования
        document.getElementById("serialInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault(); // Защита от перезагрузки
                // Перекидываем фокус на следующее поле, чтобы вы заполнили его руками
                document.getElementById("modelInput").focus();
            }
        });

        // Функция добавления данных в таблицу
        function addRow() {
            let serial = document.getElementById("serialInput").value;
            let model = document.getElementById("modelInput").value;
            let brand = document.getElementById("brandInput").value;
            let pc = document.getElementById("pcInput").value;

            if (!serial) {
                alert("Сканируйте или введите серийный номер!");
                return;
            }

            let table = document.getElementById("monitorTable").getElementsByTagName('tbody')[0];
            let newRow = table.insertRow();

            newRow.insertCell(0).innerText = serial;
            newRow.insertCell(1).innerText = model;
            newRow.insertCell(2).innerText = brand;
            newRow.insertCell(3).innerText = pc;

            // Очищаем форму для следующего монитора
            document.getElementById("serialInput").value = "";
            document.getElementById("modelInput").value = "";
            document.getElementById("brandInput").value = "";
            document.getElementById("pcInput").value = "";

            // Возвращаем фокус на поле сканера для нового цикла
            document.getElementById("serialInput").focus();
        }

        // Функция конвертации таблицы в формат, который Word поймет идеально
        function downloadWord() {
            let tableHTML = document.getElementById("monitorTable").outerHTML;
            
            // Оборачиваем таблицу в специальный XML-конверт для Microsoft Word [1]
            let wordSource = window.HTML_to_MS_Word(tableHTML);
            
            let blob = new Blob(['\ufeff' + wordSource], {
                type: 'application/msword'
            });
            
            let url = URL.createObjectURL(blob);
            let a = document.createElement('a');
            a.href = url;
            a.download = 'Учет_мониторов.doc'; // Файл скачается как документ Word [1]
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // Хелпер для сохранения форматирования границ таблицы в Word
        window.HTML_to_MS_Word = function(html) {
            return `
                <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://w3.org">
                <head><title>Time Sheet</title><style>table {border-collapse:collapse;} th,td {border:1px solid #000000; padding:5px; font-family:Arial; font-size:12pt;}</style></head>
                <body>${html}</body>
                </html>
            `;
        }
    </script>
</body>
</html>
